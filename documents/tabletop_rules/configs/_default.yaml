# Default book config — used when no book-specific config exists.
# Provides basic chapter/section parsing without entry type detection.

book:
  title: "Unknown Book"
  game_system: "Unknown"
  content_type: "rules"

# Pipeline lineage and catalog settings
lineage:
  # Pipeline version — bump when extraction logic changes materially
  pipeline_version: "0.3.0"
  # Which bronze tables to track in the catalog
  catalog_tables:
    - files
    - marker_extractions
    - page_texts
    - toc_raw
    - known_entries_raw
    - spell_list_entries
    - tables_raw
    - authority_table_entries
    - watermarks
    - ocr_issues
    - validation_results

toc:
  chapter_patterns:
    - '(?:Chapter|Appendix|Part|Section)\s+\d*\s*:?\s*[A-Za-z].*'
  table_pattern: 'Table\s+\d+\s*:?\s*[A-Za-z].*'
  toc_scan_pages: 15
  # Regex to find the printed page number on each page (standalone 1-3 digit number)
  # Search order: bottom of page first, then top
  page_number_pattern: '^\d{1,3}$'

# HTML tags to strip from Marker output during content cleanup.
# Listed as tag names (without angle brackets). Both opening and closing tags are removed.
strip_html_tags:
  - sup
  - sub
  - br
  - hr
  - em
  - strong
  - span
  - div
  - p
  - b
  - i
  - u
  - del
  - ins
  - mark

# Lines matching these regex patterns are stripped from entry content.
# Used to remove school/type annotations, tags, etc. that belong in metadata not description.
strip_content_patterns: []

# Regex substitutions applied to entry content during cleanup.
# Each item is [pattern, replacement]. Applied in order.
content_substitutions:
  - ['D- M', 'DM']

# Metadata field names used during content cleanup at ingestion time.
# When Marker smashes multiple fields onto one line (e.g. "Sphere: All Range: 60 yds."),
# the ingestion pipeline splits them into separate lines using these names.
metadata_field_names:
  - School
  - Sphere
  - Range
  - Components
  - Component
  - Duration
  - Casting Time
  - Area of Effect
  - Saving Throw
  - Power Score
  - Initial Cost
  - Maintenance Cost
  - Preparation Time
  - Prerequisites
  - Level

# Chapters to exclude entirely from page mapping and content
exclude_chapters: []

# Sections where H3/H4 headings are filtered against known_entries whitelist.
# All other sections treat every H3/H4 heading as a new entry.
# List of substrings matched against ToC section titles.
whitelist_sections: []

# Spell class detection — maps keywords found in bold headings to class names
# Used by extract_spell_list_entries to identify wizard vs priest spell columns
spell_class_keywords:
  wizard: ["wizard", "mage"]
  priest: ["priest", "cleric"]

# Spell class mapping for grouped indexes (by school = wizard, by sphere = priest)
# Used by extract_known_entries for "Spells by School" / "Spells by Sphere" sections
grouped_index_class_map:
  by_school: "wizard"
  by_sphere: "priest"

# Spell index class abbreviations — maps short codes to class names
# Used in standard index lines like "Name (Pr 4)"
spell_index_abbreviations:
  priest: ["pr", "pri", "priest"]
  wizard: ["wiz", "wizard"]

# Spell list layout thresholds (pixel tolerances for PDF column detection)
spell_list_layout:
  max_grouped_heading_length: 30
  column_match_tolerance: 25
  column_collect_tolerance: 30
  skip_patterns: ["order #"]

# Authority table cell filtering — skip values that are metadata/headers, not entries
authority_skip_values:
  - "proficiency"
  - "required"
  - "ability"
  - "modifier"
  - "check"
  - "# of slots"
  - "relevant"
  - "slots"
  - "na"
  - "special"
  - "none"
  - "intelligence"
  - "wisdom"
  - "strength"
  - "dexterity"
  - "charisma"
  - "constitution"
  - "roll"
  - "d100"
  - "secondary skill"
  # Proficiency group/category names (not individual proficiencies)
  - "general"
  - "priest"
  - "rogue"
  - "warrior"
  - "wizard"
  - "bard"
  - "ranger"
  - "paladin"
  - "druid"
  - "mage"
  - "illusionist"
  - "thief"
  - "fighter"
  - "cleric"

# Regex patterns for authority table cells to skip (prices, units, modifiers, table refs)
authority_skip_patterns:
  - '^\d[\d,]*\s*(?:cp|sp|gp|pp|ep|lbs?\.?|ft\.?)$'
  - '^[\d,./⁄½¼¾\s\-–+*]+(?:\s*(?:cp|sp|gp|pp|ep|lbs?\.?|ft\.?))?$'
  - '^[+\-–]?\d{1,2}$'
  - '^Table\s+\d+'

# OCR validation settings — two-pass architecture:
#   Bronze (fast model): high-recall scan, flags candidates
#   Silver (large model): reviews candidates, confirms or rejects
ocr_check:
  ollama_url: "http://host.docker.internal:11434"
  # Bronze pass: fast model for scanning all chunks
  bronze_model: "llama3:8b"
  # Silver pass: large model for reviewing flagged candidates
  silver_model: "llama3:70b"
  chunk_size: 800
  table_line_threshold: 0.5
  max_consecutive_failures: 5
  timeout: 180
  retries: 3
  temperature: 0.0
  bronze_max_tokens: 300
  silver_max_tokens: 300
  batch_flush_size: 100
  bronze_prompt: |
    Find OCR scanning errors in this RPG rulebook text. OCR errors are
    GARBLED WORDS where letters are wrong (e.g. "Tumans" should be "Humans",
    "Cnomes" should be "Gnomes", "rnable" should be "enable").

    Output a JSON array. Each item: {{"wrong": "garbled word", "correct": "fixed word"}}
    Output [] if no OCR errors.

    DO NOT FLAG ANY OF THESE:
    - Correct words, names, or places (Cwell, Elminster, etc.)
    - Abbreviations: rd., yds., ft., hrs., lbs., gp, sp, cp, hp, AC, THAC0
    - Fractions: 1 ⁄2, 1 ⁄4, 3 ⁄4
    - Markdown: *italic*, **bold**, ### headings, | tables |
    - Grammar, punctuation, capitalization, missing words
    - Game terms, spell names, class names, race names
    - Anything longer than a single word or short phrase

    ONLY flag single words that are clearly garbled by OCR.

    Text:
    ---
    {text}
    ---

    JSON array:
  silver_prompt: |
    You are reviewing a potential OCR error flagged by a first-pass scan
    of a tabletop RPG rulebook.

    The scanner flagged "{wrong}" and suggested it should be "{correct}".

    Here is the surrounding text for context:
    ---
    {context}
    ---

    Is this a genuine OCR error? Consider:
    - Could this be a valid game term, proper noun, or archaic spelling?
    - Does the suggested correction make sense in context?
    - Is this garbled text from a rendering artifact (not a simple OCR error)?

    Respond with ONLY a JSON object:
    {{"verdict": "confirmed" or "rejected", "reason": "brief explanation"}}

# Table extraction — two-pass: Marker pipe parsing first, VLM fallback for failures
table_extraction:
  # Validation thresholds (tables failing these go to VLM)
  min_columns: 2
  min_rows: 2
  max_smushed_cell_chars: 25
  # VLM fallback for tables that fail validation
  vlm_model: "minicpm-v:latest"
  vlm_url: "http://host.docker.internal:11434"
  vlm_timeout: 120
  vlm_prompt: |
    Extract the table from this image as a markdown pipe-delimited table.
    Output ONLY the table in this format:
    | Header1 | Header2 | Header3 |
    |---------|---------|---------|
    | cell1   | cell2   | cell3   |

    Rules:
    - Include ALL rows and columns visible in the table
    - Preserve exact text from cells
    - Use | to separate columns
    - If the table spans multiple sections, extract only the table rows
    - Output NOTHING except the markdown table
  # VLM line-level table stripping — identifies which text lines are table content
  vlm_strip_prompt: |
    Look at this page from a tabletop RPG rulebook.
    I will give you the extracted text lines numbered 1 to N.
    Identify which lines are part of TABLE content — table titles,
    column headers, data rows, and numeric grids.
    Return ONLY a JSON array of line numbers to remove.
    Do NOT include lines that are narrative paragraphs, section headings, or prose.
    Example: [3, 4, 5, 6, 7, 12, 13, 14]

prompts:
  section_summary: |
    You are summarizing a section from {book_title} for a rules reference.
    Write a concise 2-4 sentence summary of this section that captures:
    - What this section covers
    - The key rules or mechanics described
    - Any important numbers, thresholds, or exceptions
    SECTION: {section}
    CHAPTER: {chapter}
    CONTENT:
    {content}
    SUMMARY:
  entry_summary: ""

# ── Book onboarding: ToC review ──────────────────────────────────
# After bronze extracts the ToC from a new book, run:
#   docker exec lakehouse-workspace python -u scripts/tabletop_rules/review_toc.py "<filename>.pdf"
# This dumps the parsed ToC in YAML format. Review it, then:
# 1. Set toc_reviewed: true in the book config
# 2. Add any corrections under toc_corrections (title fixes, page adjustments, etc.)
# 3. Add valid_section_headings: list of H2 sub-section headings that appear in the markdown
#    (prevents Marker page-break artifacts like "# The" from becoming sections)
# The pipeline will warn if toc_reviewed is false.
toc_reviewed: false

# Corrections applied on top of parsed ToC — keyed by original parsed title.
# Supported fields: title (rename), page_start, page_end, is_excluded, remove (drop entry)
# Example:
#   toc_corrections:
#     "Chpater 1: Ability Scores":
#       title: "Chapter 1: Ability Scores"
#     "Appendix 99: Junk":
#       remove: true
toc_corrections: {}

# H2 sub-section headings that are valid within chapters.
# Marker generates H2 (##) headings for real sub-sections, but also generates
# garbage H1 (#) headings from page running headers at page breaks.
# Only headings listed here (or matching a ToC title / section_parsing key)
# are accepted as section boundaries. All other H1/H2 headings become content.
# Populated during ToC review by running review_toc.py which lists all H1/H2 headings.
valid_section_headings: []

bronze_validation:
  # Max page gap before flagging as missing content
  max_page_gap: 5
  # Min chars for a duplicate signature match
  duplicate_signature_chars: 200
  # Table completeness: warn if fewer than this % of ToC tables parsed
  min_table_match_pct: 80
  # Spell cross-check: warn if index vs list mismatch exceeds this count
  max_spell_mismatch: 10

validation:
  spell_toc_patterns:
    - "spell"
  required_metadata:
    - "Range"
    - "Duration"
    - "Casting Time"
  # Minimum chars after last metadata line to count as having a description
  min_description_chars: 20
  # Entries shorter than this are flagged as very short
  min_entry_chars: 50
  # First N chars used to detect duplicate entries
  duplicate_signature_chars: 200
  # Regex patterns for legitimate hyphenated words to exclude from validation
  hyphen_exclude_patterns:
    - '\d+(?:st|nd|rd|th)-'
    - 'warm-'

# Thresholds for ingestion content cleanup and entry building
ingestion:
  # Minimum entry content length to keep (shorter entries are discarded)
  min_entry_content: 10
  # Gibberish detection: tokens with vowel ratio below this are gibberish
  gibberish_min_vowel_ratio: 0.15
  # Gibberish detection: only check tokens at least this long (skip abbreviations)
  gibberish_min_length: 5
  # Max length for a line to be considered a mid-word fragment (dedup cleanup)
  max_fragment_length: 60
  # Max length for a lowercase line to be stripped between dedup blocks
  max_interblock_fragment_length: 80
  # Minimum description block length to keep during dedup
  min_description_block: 15
  # Chars used for dedup signature matching
  dedup_signature_chars: 80
  # Max chars in metadata value before splitting smashed description text
  max_smashed_metadata_value: 40
  # Max sub-headings collected per ToC section for query routing
  max_sub_headings_per_section: 50
  # Min/max length for valid index entry names
  min_index_entry_length: 3
  max_index_entry_length: 50
  # Snippet lengths to try when building page-position anchors (longest first)
  anchor_snippet_lengths: [40, 30, 20]
  # Max lines per page to try for anchor matching
  anchor_max_lines: 10

chunking:
  max_chars: 800
  overlap: 200


# Maps ordinal words to spell levels
spell_level_mapping:
  "first": 1
  "second": 2
  "third": 3
  "fourth": 4
  "fifth": 5
  "sixth": 6
  "seventh": 7
  "eighth": 8
  "ninth": 9

# Gold layer enrichment settings
gold:
  ollama_url: "http://host.docker.internal:11434"
  ollama_model: "llama3:70b"
  summary_model: "qwen3:30b-a3b"
  ollama_options:
    num_ctx: 4096
    num_predict: 2048
  min_summary_chars: 200
  summary_entry_types:
    - "spell"
  summary_prompt: "Summarize this D&D 2e {entry_type} entry in 1-3 sentences for a player's quick reference. Be specific about mechanics, numbers, and effects. For spells with a saving throw, always state what happens on a successful save and what happens on a failed save.\n\nEntry: {entry_title}\n\n{content}"
  annotation_prompt: "You are classifying a D&D 2e {entry_type}.\n\nEntry: {entry_title}\n{content}\n\nAnswer ONLY with JSON, no other text:\n{{\"combat\": true/false, \"popular\": true/false}}\n\nRules:\n- combat = true if the main purpose is to aid in an encounter or combat situation\n- popular = true if this is commonly found in typical player character builds"
  annotation_entry_types:
    - "spell"
    - "proficiency"

