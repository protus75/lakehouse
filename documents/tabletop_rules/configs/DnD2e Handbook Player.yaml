# AD&D 2nd Edition Player's Handbook
# Config for PDF: DnD2e Handbook Player.pdf

book:
  title: "AD&D 2nd Edition Player's Handbook"
  game_system: "D&D 2e"
  content_type: "rules"

toc:
  chapter_patterns:
    - '(?:Chapter|Appendix)\s+\d*\s*:?\s*[A-Za-z].*'
  table_pattern: 'Table\s+\d+\s*:\s*[A-Za-z].*'
  toc_scan_pages: 15
  page_number_pattern: '^\d{1,3}$'

index_headings:
  - "index"
  - "alphabetical index"
  - "general index"
  - "spell index"
  - "priest spell index"
  - "wizard spell index"
  - "spell list"
  - "priest spell list"
  - "wizard spell list"

# Lines matching these patterns are stripped from entry content during ingestion.
# Used to remove school/type annotations, tags, etc. that are metadata not content.
strip_content_patterns:
  - '^\([\w/,\s*]+\)\s*(?:Reversible)?\s*$'
  - '^Reversible\s*$'
  - '^\([\w/,\s*]+\)\s+Reversible\s*$'

content_substitutions:
  - ['D- M', 'DM']
  - ['| Tal | bl | e | 4 |', 'Table 45: Missile Weapon Ranges']
  - ['Tumans', 'Humans']
  - ['Cnomes', 'Gnomes']
  - ['Although humans are treated as a single race **Humans**', 'Humans are treated as a single race']

exclude_chapters:
  - "Appendix 1: Spell Lists"
  - "Appendix 5: Wizard Spells by School"
  - "Appendix 6: Priest Spells by Sphere"
  - "Appendix 7: Spell Index"
  - "Appendix 8: Compiled Character Generation Tables"

whitelist_sections:
  - "Wizard Spells"
  - "Priest Spells"

# Default parsing rules for all sections
parsing_defaults:
  # A heading is a short line that starts an entry
  heading_rules:
    min_length: 3
    max_length: 50
    must_start_upper: true
    no_trailing_period: true
    no_trailing_comma: true
    no_colon: true
    min_alpha_ratio: 0.7

# Per-section parsing overrides — matched by substring in the ToC title
# Each section can define its own heading rules, metadata fields to extract,
# sub-section delimiters, and entry structure
section_parsing:
  "Wizard Spells":
    # Spell sections have level sub-headers, then spell entries with stat blocks
    sub_section_pattern: '(?:First|Second|Third|Fourth|Fifth|Sixth|Seventh|Eighth|Ninth)-Level Spells'
    # A spell entry heading: name only, no colon, short
    heading_rules:
      min_length: 3
      max_length: 40
      must_start_upper: true
      no_trailing_period: true
      no_trailing_comma: true
      no_colon: true
      min_alpha_ratio: 0.7
    # Lines matching these patterns are metadata, NOT headings — keep with parent entry
    metadata_fields:
      - 'Range\s*:'
      - 'Components\s*:'
      - 'Duration\s*:'
      - 'Casting Time\s*:'
      - 'Area of Effect\s*:'
      - 'Saving Throw\s*:'
      - 'School\s*:'
      - 'Sphere\s*:'
      - 'Level\s*:'
    # Also keep these short standalone lines as part of the entry (not headings)
    keep_with_entry:
      - 'Reversible'
      - '(Conjuration.*)'
      - '(Alteration.*)'
      - '(Abjuration.*)'
      - '(Divination.*)'
      - '(Enchantment.*)'
      - '(Evocation.*)'
      - '(Illusion.*)'
      - '(Necromancy.*)'
      - '(Invocation.*)'

  "Priest Spells":
    sub_section_pattern: '(?:First|Second|Third|Fourth|Fifth|Sixth|Seventh)-Level Spells'
    heading_rules:
      min_length: 3
      max_length: 40
      must_start_upper: true
      no_trailing_period: true
      no_trailing_comma: true
      no_colon: true
      min_alpha_ratio: 0.7
    metadata_fields:
      - 'Range\s*:'
      - 'Components\s*:'
      - 'Duration\s*:'
      - 'Casting Time\s*:'
      - 'Area of Effect\s*:'
      - 'Saving Throw\s*:'
      - 'Sphere\s*:'
      - 'Level\s*:'
    keep_with_entry:
      - 'Reversible'
      - '(Conjuration.*)'
      - '(Alteration.*)'
      - '(Abjuration.*)'
      - '(Divination.*)'
      - '(Enchantment.*)'
      - '(Evocation.*)'
      - '(Illusion.*)'
      - '(Necromancy.*)'
      - '(Invocation.*)'

  "Player Character Races":
    # Race names don't appear as markdown headings — Marker renders them as
    # inline text. Detect entry boundaries by matching these anchor names at
    # the start of a non-heading line.
    entry_anchors:
      - "Dwarves"
      - "Elves"
      - "Gnomes"
      - "Half-elves"
      - "Halflings"
      - "Humans"
    anchor_name_map:
      "Dwarves": "Dwarf"
      "Elves": "Elf"
      "Gnomes": "Gnome"
      "Half-elves": "Half-Elf"
      "Halflings": "Halfling"
      "Humans": "Human"

  "Proficiencies":
    # Proficiency descriptions are "Name: description" in running text
    # not headings — detect by "CapitalWord(s): " at start of line
    inline_entry_pattern: '^([A-Z][\w\s,/''()-]+):\s+'

# Authority tables — parsed from bronze markdown as ground truth for entry names
# Each entry: {table: name, page: printed page number, type: entry_type}
# Authority names — config-based whitelist for entry types without a table source
authority_names:
  race:
    - "Dwarf"
    - "Elf"
    - "Gnome"
    - "Half-Elf"
    - "Halfling"
    - "Human"

# Authority tables — parsed from bronze markdown as ground truth for entry names
authority_tables:
  - table: "Table 13"
    page: 39
    type: class
    name_column: 0
  - table: "Table 36"
    page: 75
    type: secondary_skill
  - table: "Table 37"
    page: 76
    type: proficiency
  - table: "Table 44"
    page: 90
    type: equipment

# Tables that Marker failed to parse — provide heading text for fuzzy fallback
# These are text-only tables (no pipe formatting) that the parser couldn't auto-detect
missing_tables:
  - table_number: 21
    heading: "Wizard Spell Progression"
    content_marker: "Wizard<br>Level<br>1<br>2"
  - table_number: 40
    heading: "Movement While Tracking"
  - table_number: 65
    heading: "Base Climbing Success Rates"

validation:
  spell_toc_patterns:
    - "Appendix 3: Wizard Spells"
    - "Appendix 4: Priest Spells"
  required_metadata:
    - "Range"
    - "Component"
    - "Duration"
    - "Casting Time"
    - "Area of Effect"
    - "Saving Throw"

# Names to exclude from known_entries (watermarks, owner stamps)
exclude_entry_names:
  - "richard protus"

ocr_check:
  bronze_prompt: |
    You are proofreading OCR-scanned text from a tabletop RPG rulebook
    (AD&D 2nd Edition).

    Identify ONLY clear OCR errors and misspellings. For each error,
    output a JSON object with "wrong" and "correct" fields.

    Rules:
    - Do NOT flag game terms, archaic spellings, or proper nouns
    - Do NOT flag markdown formatting, abbreviations, or dice notation
    - ONLY flag words clearly garbled by OCR (wrong letters, merged words)
    - Output ONLY a JSON array. Empty array [] if no errors.

    Example: [{{"wrong": "Tumans", "correct": "Humans"}}]

    Text:
    ---
    {text}
    ---

    JSON array:

# ── ToC review (completed 2026-03-26) ────────────────────────────
toc_reviewed: true

# H1/H2 headings from Marker that are legitimate section boundaries.
# Garbage H1 artifacts (# The, # Good., # Characters, # Chapter N, etc.)
# are NOT listed here and will be treated as content, not section breaks.
valid_section_headings:
  # Chapter 1
  - "Ability Scores"
  - "Glossary"
  # Chapter 2
  - "Table 9: Constitution Saving Throw Bonuses"
  # Chapter 3
  - "PC Classes"
  - "Characters"
  # Chapter 5
  - "Proficiencies"
  # Chapter 6
  - "Money and Equipment"
  # Chapter 9
  - "Combat"
  - "The Attack"
  - "Attacking Without Killing"
  - "Table 57: Armor Modifiers for Wrestling"
  # Chapter 10-14
  - "Treasure"
  - "Encounters"
  - "NPCs"
  - "Vision and Light"
  - "Time and Movement"
  # Appendix 2
  - "Notes on Spells"
  - "Spell Lists"

chunking:
  max_chars: 800
  overlap: 200
