# AD&D 2nd Edition Player's Handbook
# Config for PDF: DnD2e Handbook Player.pdf

book:
  title: "AD&D 2nd Edition Player's Handbook"
  game_system: "D&D 2e"
  content_type: "rules"

toc:
  chapter_patterns:
    - '(?:Chapter|Appendix)\s+\d*\s*:?\s*[A-Za-z].*'
  table_pattern: 'Table\s+\d+\s*:\s*[A-Za-z].*'
  toc_scan_pages: 15
  page_number_pattern: '^\d{1,3}$'

index_headings:
  - "index"
  - "alphabetical index"
  - "general index"
  - "spell index"
  - "priest spell index"
  - "wizard spell index"
  - "spell list"
  - "priest spell list"
  - "wizard spell list"

# Lines matching these patterns are stripped from entry content during ingestion.
# Used to remove school/type annotations, tags, etc. that are metadata not content.
strip_content_patterns:
  - '^\([\w/,\s*]+\)\s*(?:Reversible)?\s*$'
  - '^Reversible\s*$'
  - '^\([\w/,\s*]+\)\s+Reversible\s*$'

content_substitutions:
  - ['D- M', 'DM']
  - ['| Tal | bl | e | 4 |', 'Table 45: Missile Weapon Ranges']

exclude_chapters:
  - "Appendix 1: Spell Lists"
  - "Appendix 5: Wizard Spells by School"
  - "Appendix 6: Priest Spells by Sphere"
  - "Appendix 7: Spell Index"
  - "Appendix 8: Compiled Character Generation Tables"

# Default parsing rules for all sections
parsing_defaults:
  # A heading is a short line that starts an entry
  heading_rules:
    min_length: 3
    max_length: 50
    must_start_upper: true
    no_trailing_period: true
    no_trailing_comma: true
    no_colon: true
    min_alpha_ratio: 0.7

# Per-section parsing overrides — matched by substring in the ToC title
# Each section can define its own heading rules, metadata fields to extract,
# sub-section delimiters, and entry structure
section_parsing:
  "Wizard Spells":
    # Spell sections have level sub-headers, then spell entries with stat blocks
    sub_section_pattern: '(?:First|Second|Third|Fourth|Fifth|Sixth|Seventh|Eighth|Ninth)-Level Spells'
    # A spell entry heading: name only, no colon, short
    heading_rules:
      min_length: 3
      max_length: 40
      must_start_upper: true
      no_trailing_period: true
      no_trailing_comma: true
      no_colon: true
      min_alpha_ratio: 0.7
    # Lines matching these patterns are metadata, NOT headings — keep with parent entry
    metadata_fields:
      - 'Range\s*:'
      - 'Components\s*:'
      - 'Duration\s*:'
      - 'Casting Time\s*:'
      - 'Area of Effect\s*:'
      - 'Saving Throw\s*:'
      - 'School\s*:'
      - 'Sphere\s*:'
      - 'Level\s*:'
    # Also keep these short standalone lines as part of the entry (not headings)
    keep_with_entry:
      - 'Reversible'
      - '(Conjuration.*)'
      - '(Alteration.*)'
      - '(Abjuration.*)'
      - '(Divination.*)'
      - '(Enchantment.*)'
      - '(Evocation.*)'
      - '(Illusion.*)'
      - '(Necromancy.*)'
      - '(Invocation.*)'

  "Priest Spells":
    sub_section_pattern: '(?:First|Second|Third|Fourth|Fifth|Sixth|Seventh)-Level Spells'
    heading_rules:
      min_length: 3
      max_length: 40
      must_start_upper: true
      no_trailing_period: true
      no_trailing_comma: true
      no_colon: true
      min_alpha_ratio: 0.7
    metadata_fields:
      - 'Range\s*:'
      - 'Components\s*:'
      - 'Duration\s*:'
      - 'Casting Time\s*:'
      - 'Area of Effect\s*:'
      - 'Saving Throw\s*:'
      - 'Sphere\s*:'
      - 'Level\s*:'
    keep_with_entry:
      - 'Reversible'
      - '(Conjuration.*)'
      - '(Alteration.*)'
      - '(Abjuration.*)'
      - '(Divination.*)'
      - '(Enchantment.*)'
      - '(Evocation.*)'
      - '(Illusion.*)'
      - '(Necromancy.*)'
      - '(Invocation.*)'

validation:
  spell_toc_patterns:
    - "Appendix 3: Wizard Spells"
    - "Appendix 4: Priest Spells"
  required_metadata:
    - "Range"
    - "Component"
    - "Duration"
    - "Casting Time"
    - "Area of Effect"
    - "Saving Throw"

  # Expected content per section — validator checks these appear in chunk content
  section_content:
