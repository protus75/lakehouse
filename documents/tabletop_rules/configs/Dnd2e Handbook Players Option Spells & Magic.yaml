# Player's Option: Spells & Magic
# Config for PDF: Dnd2e Handbook Players Option Spells & Magic.pdf

book:
  title: "Player's Option: Spells & Magic"
  game_system: "D&D 2e"
  content_type: "rules"

toc:
  chapter_patterns:
    - '(?:Chapter|Appendix)\s+\d*\s*:?\s*[A-Za-z].*'
  table_pattern: 'Table\s+\d+\s*:?\s*[A-Za-z].*'
  toc_scan_pages: 10
  page_number_pattern: '^\d{1,3}$'

index_headings:
  - "index"
  - "spell index"

exclude_chapters:
  - "Appendix 3: Wizard Spells by School"
  - "Appendix 4: Priest Spells by Sphere"

parsing_defaults:
  heading_rules:
    min_length: 3
    max_length: 50
    must_start_upper: true
    no_trailing_period: true
    no_trailing_comma: true
    no_colon: true
    min_alpha_ratio: 0.7

section_parsing:
  "Wizard Spells":
    sub_section_pattern: '(?:First|Second|Third|Fourth|Fifth|Sixth|Seventh|Eighth|Ninth)-Level Spells'
    heading_rules:
      min_length: 3
      max_length: 40
      must_start_upper: true
      no_trailing_period: true
      no_trailing_comma: true
      no_colon: true
      min_alpha_ratio: 0.7
    metadata_fields:
      - 'Range\s*:'
      - 'Components\s*:'
      - 'Duration\s*:'
      - 'Casting Time\s*:'
      - 'Area of Effect\s*:'
      - 'Saving Throw\s*:'
      - 'School\s*:'
      - 'Sphere\s*:'
    keep_with_entry:
      - 'Reversible'
      - '\((?:Conjuration|Alteration|Abjuration|Divination|Enchantment|Evocation|Illusion|Necromancy|Invocation).*\)'

  "Priest Spells":
    sub_section_pattern: '(?:First|Second|Third|Fourth|Fifth|Sixth|Seventh)-Level Spells'
    heading_rules:
      min_length: 3
      max_length: 40
      must_start_upper: true
      no_trailing_period: true
      no_trailing_comma: true
      no_colon: true
      min_alpha_ratio: 0.7
    metadata_fields:
      - 'Range\s*:'
      - 'Components\s*:'
      - 'Duration\s*:'
      - 'Casting Time\s*:'
      - 'Area of Effect\s*:'
      - 'Saving Throw\s*:'
      - 'Sphere\s*:'
    keep_with_entry:
      - 'Reversible'
      - '\((?:Conjuration|Alteration|Abjuration|Divination|Enchantment|Evocation|Illusion|Necromancy|Invocation).*\)'

chunking:
  max_chars: 800
  overlap: 200
