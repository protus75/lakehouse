# Player's Option: Skills & Powers
# Config for PDF: DnD23  Handbook Players Option Skills & Powers.pdf
# Note: filename has double space after "DnD23"

book:
  title: "Player's Option: Skills & Powers"
  game_system: "D&D 2e"
  content_type: "rules"

toc:
  chapter_patterns:
    - 'Chapter\s+\d+\s*:?\s*[A-Za-z].*'
  table_pattern: 'Table\s+\d+\s*:?\s*[A-Za-z].*'
  toc_scan_pages: 10
  page_number_pattern: '^\d{1,3}$'

index_headings:
  - "index"

exclude_chapters: []

parsing_defaults:
  heading_rules:
    min_length: 3
    max_length: 50
    must_start_upper: true
    no_trailing_period: true
    no_trailing_comma: true
    no_colon: true
    min_alpha_ratio: 0.7

section_parsing:
  "Psionics":
    metadata_fields:
      - 'Power Score\s*:'
      - 'Initial Cost\s*:'
      - 'Maintenance Cost\s*:'
      - 'Range\s*:'
      - 'Preparation Time\s*:'
      - 'Area of Effect\s*:'
      - 'Prerequisites\s*:'

chunking:
  max_chars: 800
  overlap: 200
