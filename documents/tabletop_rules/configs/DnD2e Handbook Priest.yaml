# The Complete Priest's Handbook
# Config for PDF: DnD2e Handbook Priest.pdf
# Note: This book has a non-standard ToC format with dotted leaders and irregular spacing

book:
  title: "The Complete Priest's Handbook"
  game_system: "D&D 2e"
  content_type: "rules"

toc:
  # This book doesn't use "Chapter N:" format — sections are named directly
  chapter_patterns:
    - '(?:Priests|Designing Faiths|Priesthood|Role of the Faith|Priests and Society|Equipping|Priest Kits|New Priest|Spells|Appendix)'
  table_pattern: ''
  toc_scan_pages: 5
  page_number_pattern: '^\d{1,3}$'

index_headings:
  - "index"

exclude_chapters: []

parsing_defaults:
  heading_rules:
    min_length: 3
    max_length: 50
    must_start_upper: true
    no_trailing_period: true
    no_trailing_comma: true
    no_colon: true
    min_alpha_ratio: 0.7

chunking:
  max_chars: 800
  overlap: 200
