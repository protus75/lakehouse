# AD&D 2nd Edition Player's Handbook
# Config for PDF: DnD2e Handbook Player.pdf

book:
  title: "AD&D 2nd Edition Player's Handbook"
  game_system: "D&D 2e"
  content_type: "rules"

toc:
  chapter_patterns:
    - '(?:Chapter|Appendix)\s+\d*\s*:?\s*[A-Za-z].*'
  table_pattern: 'Table\s+\d+\s*:\s*[A-Za-z].*'
  toc_scan_pages: 15
  page_number_pattern: '^\d{1,3}$'

# Optional: text that appears on every page in Marker output, usable as
# a page delimiter to split continuous markdown into per-page chunks.
# Not all PDFs have this — only set if a reliable per-page marker exists.
page_delimiter: "Richard Protus (Order #46790461)"

index_headings:
  - "index"
  - "alphabetical index"
  - "general index"
  - "spell index"
  - "priest spell index"
  - "wizard spell index"
  - "spell list"
  - "priest spell list"
  - "wizard spell list"

# Lines matching these patterns are stripped from entry content during ingestion.
# Used to remove school/type annotations, tags, etc. that are metadata not content.
strip_content_patterns:
  - '^\([\w/,\s*]+\)\s*(?:Reversible)?\s*$'
  - '^Reversible\s*$'
  - '^\([\w/,\s*]+\)\s+Reversible\s*$'

# Spell names that differ between spell index and content headings
spell_heading_overrides:
  "fool's gold": "fools' gold"


content_substitutions:
  - ['D- M', 'DM']
  - ['| Tal | bl | e | 4 |', 'Table 45: Missile Weapon Ranges']
  - ['Tumans', 'Humans']
  - ['Cnomes', 'Gnomes']
  - ['Although humans are treated as a single race **Humans**', 'Humans are treated as a single race']
  # Letterspaced display text (pymupdf wide-tracking, page 19)
  - ['T h e  s i x', 'The six']
  - ['c h a r a c t e r', 'character']
  - ['d e   s c r i b e d', 'described']
  - ['be low.', 'below.']
  # Line-break fragments
  - ['re newed', 'renewed']
  - ['group cessful', "group's successful"]
  - ['spellcast-Wizard ers', 'spellcasters']
  - ['communi-\n\n#### **Obscurement**', 'communication ability.\n\n#### **Obscurement**']
  # Marker garbled text (shifted-character encoding artifacts)
  - ['BSBDUFSDBOTQVSIJTTUFFEPOUPHSFBUTQFFET', '']
  - ['BEEJOH 6 feet per round', 'Adding 6 feet per round']
  - ['FTVNFTUSBDLJOHBGUFSBIBMU UPSFTU', '']
  - ['FBU', '']
  - ['GJHIU etc.).', '']
  - ['- t #FDBVTFTQFDJBMJTUTIBWFBO enhanced understanding', '- Because specialists have an enhanced understanding']
  - ['- t 4QFDJBMJTUTSFDFJWFBCPOVTPGXIFO learning', '- Specialists receive a bonus of +15% when learning']
  - ['Equipment ine ioliowing iss include india of the equipment', 'equipment']
  - ['Player Criditacters also carried ence points', 'Player Characters also carried experience points']
  - ['tates the total number', 'dictates the total number']
  - ['tions (see below). These spells', 'Divinations (see below). These spells']
  # Garbled encoded lines (full removal)
  - ['fbqgspnuifcbdlpguifnpvouboeespqgffuupuif', '']
  - ['fbqpoupuiftbeemfpguifdsfbuvsf', '']
  - ['dsfbuvsftmfbwing', '']
  - ['tfdpoeusbdldspttftuifgjstu', '']
  - ['tqfdjbmjtuhbjotpofbeejtional', '']
  - ['xifojujttuboejohpo', '']
  - ['drelb', 'Drelb']

exclude_chapters:
  - "Appendix 1: Spell Lists"
  - "Appendix 5: Wizard Spells by School"
  - "Appendix 6: Priest Spells by Sphere"
  - "Appendix 7: Spell Index"
  - "Appendix 8: Compiled Character Generation Tables"

whitelist_sections:
  - "Wizard Spells"
  - "Priest Spells"

# Default parsing rules for all sections
parsing_defaults:
  # A heading is a short line that starts an entry
  heading_rules:
    min_length: 3
    max_length: 50
    must_start_upper: true
    no_trailing_period: true
    no_trailing_comma: true
    no_colon: true
    min_alpha_ratio: 0.7

# Per-ToC-entry overrides — keyed by exact ToC title, no string matching
# entry_mode: toc (default), per_list, per_anchor
toc_overrides:
  "Appendix 3: Wizard Spells":
    entry_mode: per_list
    list_source: spell_list_entries
    sub_section_pattern: '(?:First|Second|Third|Fourth|Fifth|Sixth|Seventh|Eighth|Ninth)-Level Spells'
    heading_rules:
      min_length: 3
      max_length: 40
      must_start_upper: true
      no_trailing_period: true
      no_trailing_comma: true
      no_colon: true
      min_alpha_ratio: 0.7
    metadata_fields:
      - 'Range\s*:'
      - 'Components\s*:'
      - 'Duration\s*:'
      - 'Casting Time\s*:'
      - 'Area of Effect\s*:'
      - 'Saving Throw\s*:'
      - 'School\s*:'
      - 'Sphere\s*:'
      - 'Level\s*:'
    keep_with_entry:
      - 'Reversible'
      - '(Conjuration.*)'
      - '(Alteration.*)'
      - '(Abjuration.*)'
      - '(Divination.*)'
      - '(Enchantment.*)'
      - '(Evocation.*)'
      - '(Illusion.*)'
      - '(Necromancy.*)'
      - '(Invocation.*)'

  "Appendix 4: Priest Spells":
    entry_mode: per_list
    list_source: spell_list_entries
    sub_section_pattern: '(?:First|Second|Third|Fourth|Fifth|Sixth|Seventh)-Level Spells'
    heading_rules:
      min_length: 3
      max_length: 40
      must_start_upper: true
      no_trailing_period: true
      no_trailing_comma: true
      no_colon: true
      min_alpha_ratio: 0.7
    metadata_fields:
      - 'Range\s*:'
      - 'Components\s*:'
      - 'Duration\s*:'
      - 'Casting Time\s*:'
      - 'Area of Effect\s*:'
      - 'Saving Throw\s*:'
      - 'Sphere\s*:'
      - 'Level\s*:'
    keep_with_entry:
      - 'Reversible'
      - '(Conjuration.*)'
      - '(Alteration.*)'
      - '(Abjuration.*)'
      - '(Divination.*)'
      - '(Enchantment.*)'
      - '(Evocation.*)'
      - '(Illusion.*)'
      - '(Necromancy.*)'
      - '(Invocation.*)'

  "The Real Basics":
    entry_anchors:
      - "**The Goal**"
      - "**Required"
      - "**An Example"
    anchor_name_map:
      "**The Goal**": "The Goal"
      "**Required": "Required Materials"
      "**An Example": "An Example of Play"

  "Nonweapon Proficiency Descriptions":
    entry_mode: per_list
    list_source: authority_table_entries
    list_filter_type: proficiency

  "Player Character Races":
    entry_mode: per_anchor
    entry_anchors:
      - "Dwarves"
      - "Elves"
      - "Gnomes"
      - "Half-elves"
      - "Halflings"
      - "Humans"
    anchor_name_map:
      "Dwarves": "Dwarf"
      "Elves": "Elf"
      "Gnomes": "Gnome"
      "Half-elves": "Half-Elf"
      "Halflings": "Halfling"
      "Humans": "Human"

  "Proficiencies":
    inline_entry_pattern: '^([A-Z][\w\s,/''()-]+):\s+'

  # Heading overrides — ToC title differs from actual page heading
  "Spells Allowed (Spheres of Influence)":
    heading_override: "Spells Allowed"
  "Related Weapon Bonus":
    heading_override: "Related Weapons Bonus"
  "The Various Types of Weapons":
    heading_override: "Slashing weapons include"
    page_start_override: 119
  "Herbalism and Healing Proficiencies":
    heading_override: "Herbalism & Healing Proficiencies"

# Authority tables — parsed from bronze markdown as ground truth for entry names
# Each entry: {table: name, page: printed page number, type: entry_type}
# Authority names — config-based whitelist for entry types without a table source
authority_names:
  race:
    - "Dwarf"
    - "Elf"
    - "Gnome"
    - "Half-Elf"
    - "Halfling"
    - "Human"

# Authority tables — parsed from bronze markdown as ground truth for entry names
authority_tables:
  - table: "Table 13"
    page: 39
    type: class
    name_column: 0
  - table: "Table 36"
    page: 75
    type: secondary_skill
  - table: "Table 37"
    page: 76
    type: proficiency
  - table: "Table 44"
    page: 90
    type: equipment

# Extra hints for tables the ToC-driven extractor needs help finding.
# content_marker: unique string in the pipe block to locate it
# heading: heading text near the table for fuzzy matching
table_hints:
  "Weapons":
    content_marker: "| Arquebus"
  "Armor":
    content_marker: "| Banded mail"

validation:
  spell_toc_patterns:
    - "Appendix 3: Wizard Spells"
    - "Appendix 4: Priest Spells"
  required_metadata:
    - "Range"
    - "Component"
    - "Duration"
    - "Casting Time"
    - "Area of Effect"
    - "Saving Throw"

# Names to exclude from known_entries (watermarks, owner stamps)
exclude_entry_names:
  - "richard protus"

ocr_check:
  bronze_prompt: |
    You are proofreading OCR-scanned text from a tabletop RPG rulebook
    (AD&D 2nd Edition).

    Identify ONLY clear OCR errors and misspellings. For each error,
    output a JSON object with "wrong" and "correct" fields.

    Rules:
    - Do NOT flag game terms, archaic spellings, or proper nouns
    - Do NOT flag markdown formatting, abbreviations, or dice notation
    - ONLY flag words clearly garbled by OCR (wrong letters, merged words)
    - Output ONLY a JSON array. Empty array [] if no errors.

    Example: [{{"wrong": "Tumans", "correct": "Humans"}}]

    Text:
    ---
    {text}
    ---

    JSON array:

# ── ToC review (completed 2026-03-26) ────────────────────────────
toc_reviewed: true

# H1/H2 headings from Marker that are legitimate section boundaries.
# Garbage H1 artifacts (# The, # Good., # Characters, # Chapter N, etc.)
# are NOT listed here and will be treated as content, not section breaks.
valid_section_headings:
  # Chapter 1
  - "Ability Scores"
  - "Glossary"
  # Chapter 2
  - "Table 9: Constitution Saving Throw Bonuses"
  # Chapter 3
  - "PC Classes"
  - "Characters"
  # Chapter 5
  - "Proficiencies"
  # Chapter 6
  - "Money and Equipment"
  # Chapter 9
  - "Combat"
  - "The Attack"
  - "Attacking Without Killing"
  - "Table 57: Armor Modifiers for Wrestling"
  # Chapter 10-14
  - "Treasure"
  - "Encounters"
  - "NPCs"
  - "Vision and Light"
  - "Time and Movement"
  # Appendix 2
  - "Notes on Spells"
  - "Spell Lists"

chunking:
  max_chars: 800
  overlap: 200

