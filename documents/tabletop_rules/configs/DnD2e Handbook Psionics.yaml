# The Complete Psionics Handbook
# Config for PDF: DnD2e Handbook Psionics.pdf

book:
  title: "The Complete Psionics Handbook"
  game_system: "D&D 2e"
  content_type: "rules"

toc:
  chapter_patterns:
    - 'Chapter\s+\w+\s*:?\s*[A-Za-z].*'
    - 'Appendix|Appendices'
  table_pattern: ''
  toc_scan_pages: 8
  page_number_pattern: '^\d{1,3}$'

index_headings:
  - "index"
  - "powers index"

exclude_chapters:
  - "Summary of Psionic Powers"
  - "Powers Index"
  - "Monstrous Compendium Update"

parsing_defaults:
  heading_rules:
    min_length: 3
    max_length: 50
    must_start_upper: true
    no_trailing_period: true
    no_trailing_comma: true
    no_colon: true
    min_alpha_ratio: 0.7

section_parsing:
  "Clairsentience":
    metadata_fields:
      - 'Power Score\s*:'
      - 'Initial Cost\s*:'
      - 'Maintenance Cost\s*:'
      - 'Range\s*:'
      - 'Preparation Time\s*:'
      - 'Area of Effect\s*:'
      - 'Prerequisites\s*:'

  "Psychokinesis":
