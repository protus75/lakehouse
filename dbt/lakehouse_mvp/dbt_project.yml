name: lakehouse_mvp
version: '1.0.0'
config-version: 2

profile: lakehouse_mvp

vars:
  warehouse_path: /lakehouse-data

model-paths: ["models"]
test-paths:  ["tests"]

# Bronze view registration is now handled by the iceberg plugin's
# configure_connection hook (see dlt/lib/dbt_iceberg_plugin.py). It
# enumerates the live catalog at session start instead of relying on
# a hardcoded macro list.

models:
  lakehouse_mvp:
    staging:
      +materialized: table
      +schema: staging
    marts:
      +materialized: table
      +schema: marts
    tabletop:
      # Phase 2a proof: silver_files is the ONLY model converted to the new
      # iceberg materialization. Once it works end-to-end, Phase 2c rolls
      # this default up to the silver/gold groups and removes per-model
      # overrides everywhere.
      silver:
        +materialized: table
        +schema: silver_tabletop
      gold:
        +materialized: table
        +schema: gold_tabletop
