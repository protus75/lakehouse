version: 2

models:
  - name: silver_page_anchors
    description: "Page-position anchors mapping markdown positions to PDF pages"
    columns:
      - name: source_file
        tests:
          - not_null
      - name: markdown_position
        tests:
          - not_null
      - name: page_index
        tests:
          - not_null

  # silver_entries is now a Dagster asset (dlt/silver_tabletop/entries.py),
  # not a dbt model. Its tests live as singular SQL tests under
  # tests/tabletop/ (silver_entries_*.sql) — see those files for the
  # uniqueness, not-null, and toc_id->silver_toc_sections relationship checks.

  - name: silver_toc_sections
    description: "ToC sections with sub_headings populated from entries"
    columns:
      - name: toc_id
        tests:
          - unique
          - not_null
      - name: source_file
        tests:
          - not_null
      - name: title
        tests:
          - not_null

  - name: silver_known_entries
    description: "Known entries from index with validation flag"
    columns:
      - name: source_file
        tests:
          - not_null
      - name: entry_name
        tests:
          - not_null

  - name: silver_spell_meta
    description: "Structured spell metadata parsed from entry content header"
    columns:
      - name: entry_id
        tests:
          - not_null
          - unique
          - relationships:
              to: source('silver_tabletop', 'silver_entries')
              field: entry_id
      - name: source_file
        tests:
          - not_null

  - name: silver_entry_descriptions
    description: "Clean entry descriptions with metadata/material stripped"
    columns:
      - name: entry_id
        tests:
          - not_null
          - relationships:
              to: source('silver_tabletop', 'silver_entries')
              field: entry_id
      - name: source_file
        tests:
          - not_null
      - name: content
        tests:
          - not_null

  - name: silver_files
    description: "File-level aggregated metadata"
    columns:
      - name: source_file
        tests:
          - unique
          - not_null
      - name: total_entries
        tests:
          - not_null
