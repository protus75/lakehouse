version: 2

models:
  - name: gold_chunks
    description: "Query-ready chunks for RAG retrieval and ChromaDB embedding"
    columns:
      - name: chunk_id
        tests:
          - unique
          - not_null
      - name: entry_id
        tests:
          - not_null
          - relationships:
              to: ref('silver_entries')
              field: entry_id
      - name: toc_id
        tests:
          - relationships:
              to: ref('silver_toc_sections')
              field: toc_id
      - name: source_file
        tests:
          - not_null
      - name: content
        tests:
          - not_null
      - name: char_count
        tests:
          - not_null

  - name: gold_toc
    description: "Denormalized ToC for query routing"
    columns:
      - name: toc_id
        tests:
          - unique
          - not_null
      - name: title
        tests:
          - not_null

  - name: gold_files
    description: "File-level chunk aggregates"
    columns:
      - name: source_file
        tests:
          - unique
          - not_null

  - name: gold_entry_index
    description: "Structured cross-reference index for fast queries"
    columns:
      - name: entry_id
        tests:
          - unique
          - not_null
      - name: entry_type
        tests:
          - not_null
          - accepted_values:
              values: ['spell', 'proficiency', 'class', 'rule']

  - name: gold_entry_descriptions
    description: "Clean entry descriptions from silver (owned by publish)"
    columns:
      - name: entry_id
        tests:
          - not_null
          - relationships:
              to: ref('silver_entries')
              field: entry_id
      - name: source_file
        tests:
          - not_null
      - name: entry_type
        tests:
          - not_null
      - name: content
        tests:
          - not_null

  # gold_ai_summaries and gold_ai_annotations are owned by enrichment
  # (scripts/tabletop_rules/enrich_summaries.py and enrich_annotations.py)
  # Separate tables — publish never touches them
