lakehouse_mvp:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: /workspace/db/lakehouse.duckdb
      schema: staging
      threads: 4
      extensions:
        - iceberg
        - httpfs
      settings:
        s3_endpoint: seaweedfs-s3:8333
        s3_access_key_id: lakehouse_key
        s3_secret_access_key: lakehouse_secret
        s3_url_style: path
        s3_use_ssl: false
        unsafe_enable_version_guessing: true
