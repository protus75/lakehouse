# Lakehouse configuration — single source of truth for all services.
# All code reads from this file via dlt.lib.iceberg_catalog. Nothing hardcoded.

s3:
  endpoint: http://seaweedfs-s3:8333
  access_key: lakehouse_key
  secret_key: lakehouse_secret
  region: us-east-1

catalog:
  name: lakehouse
  type: sql
  uri: postgresql+psycopg2://iceberg:iceberg_secret@postgres:5432/iceberg
  warehouse: s3://lakehouse/warehouse
  s3.endpoint: http://seaweedfs-s3:8333
  s3.access-key-id: lakehouse_key
  s3.secret-access-key: lakehouse_secret
  s3.region: us-east-1

buckets:
  warehouse: lakehouse

namespaces:
  bronze: bronze_tabletop
  silver: silver_tabletop
  gold: gold_tabletop

# Stable integer keys — deterministic hash-based IDs that survive rebuilds.
# Each key type defines which columns form the natural key.
stable_keys:
  entry_id:
    columns: [source_file, toc_title, entry_title, section_title]
  toc_id:
    columns: [source_file, title]
  chunk_id:
    columns: [source_file, toc_title, entry_title, chunk_index]

# Path configuration
paths:
  documents: /workspace/documents/tabletop_rules/raw
  marker_cache: /workspace/documents/tabletop_rules/processed/marker
  configs: /workspace/documents/tabletop_rules/configs

# Models to seed — all models used by any pipeline step.
# seed_models job pulls these; all other jobs run offline.
models:
  ollama:
    url: "http://host.docker.internal:11434"
    models:
      - "llama3:70b"
      - "llama3:8b"
      - "minicpm-v:latest"
      - "qwen3:30b-a3b"
      - "glm-4.7-flash"
  huggingface:
    models:
      - "sentence-transformers/all-MiniLM-L6-v2"
